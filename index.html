<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Izipay Q161 Pro — Simulador</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0c0c16;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 48px;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 0;
    }

    .logo-izi {
      font-size: 48px;
      font-weight: 900;
      color: #dc1c1b;
    }

    .logo-pay {
      font-size: 48px;
      font-weight: 900;
      color: rgba(255,255,255,0.15);
    }

    .subtitle {
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: -8px;
    }

    .cards {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: 280px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    .card-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-icon-device {
      background: rgba(220,28,27,0.12);
    }

    .card-icon-screen {
      background: rgba(0,131,128,0.12);
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      text-align: center;
    }

    .card-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      text-align: center;
      line-height: 1.6;
    }

    .card-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 20px;
    }

    .badge-red {
      background: rgba(220,28,27,0.15);
      color: #dc1c1b;
    }

    .badge-teal {
      background: rgba(0,131,128,0.15);
      color: #008380;
    }

    .footer {
      color: rgba(255,255,255,0.15);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
    <div class="logo">
      <span class="logo-izi">izi</span><span class="logo-pay">pay</span>
    </div>
    <div class="subtitle">Simulador Q161 Pro</div>
  </div>

  <div class="cards">
    <a class="card" href="izipay-sim.html">
      <div class="card-icon card-icon-device">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#dc1c1b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
          <rect x="8" y="5" width="8" height="10" rx="1"/>
          <line x1="12" y1="18" x2="12" y2="18.01" stroke-width="2.5"/>
        </svg>
      </div>
      <div class="card-title">Con Carcasa</div>
      <div class="card-desc">Vista completa del dispositivo POS con la carcasa Aisino Q161 Pro</div>
      <div class="card-badge badge-red">Dispositivo</div>
    </a>

    <a class="card" href="izipay-ui.html">
      <div class="card-icon card-icon-screen">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#008380" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="21" x2="9" y2="9"/>
        </svg>
      </div>
      <div class="card-title">Solo Pantalla</div>
      <div class="card-desc">Vista de la interfaz de usuario sin carcasa, ideal para presentaciones</div>
      <div class="card-badge badge-teal">Pantalla</div>
    </a>
  </div>

  <div class="footer">Selecciona una vista para comenzar</div>

</body>
</html>
